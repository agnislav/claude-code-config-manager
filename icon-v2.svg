<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#14141F"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C4956A"/>
    </linearGradient>
    <linearGradient id="braces" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C5A0"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Large curly braces (outer element) -->
  <g transform="translate(64,64)">
    <g fill="none" stroke="url(#braces)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left brace { -->
      <path d="M-30,-30 L-36,-30 L-36,-6 L-44,0 L-36,6 L-36,30 L-30,30"/>
      <!-- Right brace } -->
      <path d="M30,-30 L36,-30 L36,-6 L44,0 L36,6 L36,30 L30,30"/>
    </g>
  </g>

  <!-- Small gear/cog (inner, centered) -->
  <g transform="translate(64,64)">
    <!-- Gear teeth -->
    <g fill="url(#braces)" opacity="0.85">
      <rect x="-3.5" y="-20" width="7" height="7" rx="1.5"/>
      <rect x="-3.5" y="13" width="7" height="7" rx="1.5"/>
      <rect x="-20" y="-3.5" width="7" height="7" rx="1.5"/>
      <rect x="13" y="-3.5" width="7" height="7" rx="1.5"/>
      <rect x="8" y="-17.5" width="7" height="7" rx="1.5" transform="rotate(45, 11.5, -14)"/>
      <rect x="-15" y="-17.5" width="7" height="7" rx="1.5" transform="rotate(-45, -11.5, -14)"/>
      <rect x="8" y="10.5" width="7" height="7" rx="1.5" transform="rotate(-45, 11.5, 14)"/>
      <rect x="-15" y="10.5" width="7" height="7" rx="1.5" transform="rotate(45, -11.5, 14)"/>
    </g>

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="13" fill="none" stroke="url(#braces)" stroke-width="5" opacity="0.85"/>

    <!-- Inner dark circle -->
    <circle cx="0" cy="0" r="8" fill="#1E1E2E"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="url(#braces)" opacity="0.7"/>
  </g>

  <!-- Claude sparkle/asterisk accent (top-right) -->
  <g transform="translate(106, 20)" fill="#D4A574" opacity="0.9">
    <circle cx="0" cy="0" r="2.2"/>
    <rect x="-1.3" y="-8" width="2.6" height="16" rx="1.3"/>
    <rect x="-8" y="-1.3" width="16" height="2.6" rx="1.3"/>
    <rect x="-1.3" y="-8" width="2.6" height="16" rx="1.3" transform="rotate(45)"/>
    <rect x="-8" y="-1.3" width="16" height="2.6" rx="1.3" transform="rotate(45)"/>
  </g>
</svg>