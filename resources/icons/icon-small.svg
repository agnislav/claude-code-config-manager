<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Curly braces (outer) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left brace { -->
    <path d="M5.5,4 L4,4 L4,9.5 L2,12 L4,14.5 L4,20 L5.5,20"/>
    <!-- Right brace } -->
    <path d="M18.5,4 L20,4 L20,9.5 L22,12 L20,14.5 L20,20 L18.5,20"/>
  </g>

  <!-- Small gear/cog (centered) -->
  <g transform="translate(12,12)">
    <!-- Gear teeth -->
    <g fill="currentColor" opacity="0.85">
      <rect x="-0.8" y="-4.8" width="1.6" height="1.6" rx="0.3"/>
      <rect x="-0.8" y="3.2" width="1.6" height="1.6" rx="0.3"/>
      <rect x="-4.8" y="-0.8" width="1.6" height="1.6" rx="0.3"/>
      <rect x="3.2" y="-0.8" width="1.6" height="1.6" rx="0.3"/>
      <rect x="2" y="-4.2" width="1.6" height="1.6" rx="0.3" transform="rotate(45, 2.8, -3.4)"/>
      <rect x="-3.6" y="-4.2" width="1.6" height="1.6" rx="0.3" transform="rotate(-45, -2.8, -3.4)"/>
      <rect x="2" y="2.6" width="1.6" height="1.6" rx="0.3" transform="rotate(-45, 2.8, 3.4)"/>
      <rect x="-3.6" y="2.6" width="1.6" height="1.6" rx="0.3" transform="rotate(45, -2.8, 3.4)"/>
    </g>

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="3" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.85"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="1.2" fill="currentColor" opacity="0.7"/>
  </g>
</svg>