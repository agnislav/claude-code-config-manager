<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#14141F"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C4956A"/>
    </linearGradient>
    <linearGradient id="braces" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C5A0"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Gear/cog shape -->
  <g transform="translate(64,64)">
    <!-- Gear teeth -->
    <g fill="url(#gear)" opacity="0.85">
      <rect x="-6" y="-44" width="12" height="12" rx="2.5"/>
      <rect x="-6" y="32" width="12" height="12" rx="2.5"/>
      <rect x="-44" y="-6" width="12" height="12" rx="2.5"/>
      <rect x="32" y="-6" width="12" height="12" rx="2.5"/>
      <rect x="21" y="-38" width="12" height="12" rx="2.5" transform="rotate(45, 27, -32)"/>
      <rect x="-33" y="-38" width="12" height="12" rx="2.5" transform="rotate(-45, -27, -32)"/>
      <rect x="21" y="26" width="12" height="12" rx="2.5" transform="rotate(-45, 27, 32)"/>
      <rect x="-33" y="26" width="12" height="12" rx="2.5" transform="rotate(45, -27, 32)"/>
    </g>

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#gear)" stroke-width="8" opacity="0.85"/>

    <!-- Inner dark circle -->
    <circle cx="0" cy="0" r="22" fill="#1E1E2E"/>

    <!-- JSON curly braces as paths — angular/straight style, thicker -->
    <g fill="none" stroke="url(#braces)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left brace { -->
      <path d="M-5,-13 L-8,-13 L-8,-3 L-13,0 L-8,3 L-8,13 L-5,13"/>
      <!-- Right brace } -->
      <path d="M5,-13 L8,-13 L8,-3 L13,0 L8,3 L8,13 L5,13"/>
    </g>
  </g>

  <!-- Claude sparkle/asterisk accent (top-right, thicker) -->
  <g transform="translate(106, 20)" fill="#D4A574" opacity="0.9">
    <circle cx="0" cy="0" r="2.2"/>
    <rect x="-1.3" y="-8" width="2.6" height="16" rx="1.3"/>
    <rect x="-8" y="-1.3" width="16" height="2.6" rx="1.3"/>
    <rect x="-1.3" y="-8" width="2.6" height="16" rx="1.3" transform="rotate(45)"/>
    <rect x="-8" y="-1.3" width="16" height="2.6" rx="1.3" transform="rotate(45)"/>
  </g>
</svg>